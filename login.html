<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Clôture Impress</title>
  <link rel="icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a35a;
      --dark: #0a0a0a;
      --surface: #111111;
      --border: rgba(201,163,90,0.2);
      --text: #f5f0e8;
      --muted: #777;
    }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(201,163,90,0.06) 0%, transparent 70%);
    }
    .login-wrap { width: 100%; max-width: 420px; padding: 1rem; }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 3rem 2.5rem;
    }
    .login-logo { display: block; margin: 0 auto 2rem; height: 60px; width: auto; }
    .login-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 400; text-align: center; margin-bottom: 0.5rem; }
    .gold-line { width: 36px; height: 1px; background: var(--gold); margin: 0 auto 1.5rem; }
    .login-sub { text-align: center; color: var(--muted); font-size: 0.82rem; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; }
    input[type="email"], input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      padding: 0.8rem 1rem;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: var(--gold); }
    .btn-login {
      width: 100%;
      background: var(--gold);
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    .btn-login:hover:not(:disabled) { opacity: 0.85; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      background: rgba(255,80,80,0.08);
      border: 1px solid rgba(255,80,80,0.25);
      border-radius: 6px;
      color: #ff7070;
      font-size: 0.85rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .back-link { display: block; text-align: center; color: var(--muted); font-size: 0.8rem; text-decoration: none; margin-top: 1.75rem; transition: color 0.2s; }
    .back-link:hover { color: var(--gold); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <img src="logo.png" alt="Clôture Impress" class="login-logo">
      <h1 class="login-title">Espace équipe</h1>
      <div class="gold-line"></div>
      <p class="login-sub">Accès réservé au personnel autorisé</p>
      <div class="error-msg" id="error-msg"></div>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Courriel</label>
          <input type="email" id="email" autocomplete="email" placeholder="nom@clotureimpress.com" required>
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login" id="btn-login">Se connecter</button>
      </form>
      <a href="/" class="back-link">← Retour au site</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = '/dashboard.html';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.textContent = 'Connexion...';
      btn.disabled = true;

      const { error } = await sb.auth.signInWithPassword({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      });

      if (error) {
        errEl.textContent = 'Courriel ou mot de passe invalide.';
        errEl.style.display = 'block';
        btn.textContent = 'Se connecter';
        btn.disabled = false;
        return;
      }
      window.location.href = '/dashboard.html';
    });
  </script>
</body>
</html>
