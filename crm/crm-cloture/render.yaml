services:
  - type: web
    name: cloture-crm
    env: node
    rootDir: .
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cloture-crm-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: cloture-crm-db
    databaseName: crm
    user: crm
